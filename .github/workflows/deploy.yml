name: Enterprise CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install

      - run: npm test

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/train-schedule:${{ github.sha }} \
            -t ${{ secrets.DOCKER_USERNAME }}/train-schedule:latest .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/train-schedule:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/train-schedule:latest

  deploy-staging:

    needs: build

    runs-on: ubuntu-latest

    environment:
      name: staging

    steps:

      - name: Deploy to Staging
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USERNAME }}
          key: ${{ secrets.STAGING_SSH_KEY }}

          script: |

            docker pull ${{ secrets.DOCKER_USERNAME }}/train-schedule:${{ github.sha }}

            docker stop train-schedule || true

            docker rm train-schedule || true

            docker run -d \
              --restart always \
              --name train-schedule \
              -p 80:3000 \
              ${{ secrets.DOCKER_USERNAME }}/train-schedule:${{ github.sha }}

            sleep 10

            curl -f http://localhost

  deploy-production:

    needs: deploy-staging

    runs-on: ubuntu-latest

    environment:
      name: production

    steps:

      - name: Deploy to Production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.PROD_SSH_KEY }}

          script: |

            docker pull ${{ secrets.DOCKER_USERNAME }}/train-schedule:${{ github.sha }}

            docker stop train-schedule || true

            docker rm train-schedule || true

            docker run -d \
              --restart always \
              --name train-schedule \
              -p 80:3000 \
              ${{ secrets.DOCKER_USERNAME }}/train-schedule:${{ github.sha }}

            sleep 10

            curl -f http://localhost
